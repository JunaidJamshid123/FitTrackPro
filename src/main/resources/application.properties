spring.application.name=fittrackpro

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# PostgreSQL DataSource
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/fittrackpro
spring.datasource.username=postgres
spring.datasource.password=Junaid123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT (override secret via env var JWT_SECRET in production)
# Secret must be at least 256 bits (32+ chars) for HS256
# ===============================
app.jwt.secret=${JWT_SECRET:ChangeMeToA32PlusCharacterRandomSecretValue!!}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.issuer=fittrackpro

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# Actuator (lock down in prod)
# ===============================
management.endpoints.web.exposure.include=health,info
